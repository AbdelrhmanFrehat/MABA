name: Deploy MABA

# ─────────────────────────────────────────────────────────────────────────────
# HOW THIS WORKS
# Build jobs run on GitHub-hosted runners (ubuntu-latest).
# The deploy job runs on a self-hosted runner installed ON the production server.
# The runner makes outbound HTTPS connections to GitHub — no inbound SSH needed.
#
# ONE-TIME SERVER SETUP (run these once on the server as user "abd"):
#
#   1. Install the runner:
#      mkdir -p ~/actions-runner && cd ~/actions-runner
#      curl -sL https://github.com/actions/runner/releases/latest/download/actions-runner-linux-x64-$(curl -s https://api.github.com/repos/actions/runner/releases/latest | grep tag_name | cut -d'"' -f4 | cut -c2-).tar.gz | tar xz
#      ./config.sh --url https://github.com/YOUR_ORG/MABA --token YOUR_TOKEN --labels maba-prod --unattended
#      sudo ./svc.sh install && sudo ./svc.sh start
#
#   2. Allow passwordless sudo for service management only:
#      echo "abd ALL=(ALL) NOPASSWD: /bin/systemctl daemon-reload, /bin/systemctl enable maba-backend.service maba-frontend.service, /bin/systemctl restart maba-backend.service, /bin/systemctl restart maba-frontend.service, /bin/systemctl is-active maba-backend.service, /bin/systemctl is-active maba-frontend.service, /usr/bin/tee /etc/systemd/system/maba-backend.service, /usr/bin/tee /etc/systemd/system/maba-frontend.service, /usr/bin/apt-get install -y jq, /usr/bin/npm install -g serve" | sudo tee /etc/sudoers.d/maba-deploy
#
#   3. Install prerequisites:
#      sudo apt-get install -y jq
#      sudo npm install -g serve
#
# REQUIRED GITHUB SECRETS:
#   DB_CONNECTION_STRING  — full SQL Server connection string for production
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_ROOT: /home/abd/WebSites/MABA

jobs:
  # ── 1. Build Angular frontend ───────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: UI/package-lock.json

      - name: Install dependencies
        working-directory: ./UI
        run: npm ci

      - name: Build
        working-directory: ./UI
        run: npm run build -- --configuration production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: UI/dist/maba-ng/
          retention-days: 1

  # ── 2. Build .NET backend ───────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        working-directory: ./API
        run: dotnet restore --runtime linux-x64

      - name: Publish
        working-directory: ./API/Maba.Api
        run: |
          dotnet publish \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output ./publish-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: API/Maba.Api/publish-linux/
          retention-days: 1

  # ── 3. Deploy — runs directly ON the server, no SSH needed ─────────────────
  deploy:
    name: Deploy to Production
    needs: [build-frontend, build-backend]
    runs-on: [self-hosted, maba-prod]

    steps:
      - name: Prepare directories
        run: |
          mkdir -p ${{ env.DEPLOY_ROOT }}/maba-ng
          mkdir -p ${{ env.DEPLOY_ROOT }}/publish
          mkdir -p ${{ env.DEPLOY_ROOT }}/logs
          mkdir -p ${{ env.DEPLOY_ROOT }}/backups
          mkdir -p /tmp/maba-deploy

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/maba-deploy/frontend

      - name: Deploy frontend
        run: |
          BACKUP=${{ env.DEPLOY_ROOT }}/backups/frontend-$(date +%Y%m%d-%H%M%S)
          mkdir -p "$BACKUP"
          [ "$(ls -A ${{ env.DEPLOY_ROOT }}/maba-ng 2>/dev/null)" ] && \
            cp -r ${{ env.DEPLOY_ROOT }}/maba-ng/* "$BACKUP/" 2>/dev/null || true
          rm -rf ${{ env.DEPLOY_ROOT }}/maba-ng/*
          cp -r /tmp/maba-deploy/frontend/* ${{ env.DEPLOY_ROOT }}/maba-ng/
          rm -rf /tmp/maba-deploy/frontend
          echo "Frontend deployed — backup at $BACKUP"

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: /tmp/maba-deploy/backend

      - name: Deploy backend
        run: |
          BACKUP=${{ env.DEPLOY_ROOT }}/backups/backend-$(date +%Y%m%d-%H%M%S)
          mkdir -p "$BACKUP"
          [ "$(ls -A ${{ env.DEPLOY_ROOT }}/publish 2>/dev/null)" ] && \
            cp -r ${{ env.DEPLOY_ROOT }}/publish/* "$BACKUP/" 2>/dev/null || true
          cp -r /tmp/maba-deploy/backend/* ${{ env.DEPLOY_ROOT }}/publish/
          rm -rf /tmp/maba-deploy/backend
          mkdir -p ${{ env.DEPLOY_ROOT }}/publish/wwwroot
          mkdir -p ${{ env.DEPLOY_ROOT }}/publish/logs
          chmod -x ${{ env.DEPLOY_ROOT }}/publish/*.dll 2>/dev/null || true
          echo "Backend deployed — backup at $BACKUP"

      - name: Patch production connection string
        run: |
          cd ${{ env.DEPLOY_ROOT }}/publish
          # Ensure jq is available
          command -v jq || sudo apt-get install -y jq
          # Patch appsettings.Production.json (overrides appsettings.json at runtime)
          jq --arg conn "${{ secrets.DB_CONNECTION_STRING }}" \
            '.ConnectionStrings.DefaultConnection = $conn' \
            appsettings.Production.json > appsettings.tmp \
            && mv appsettings.tmp appsettings.Production.json
          echo "Connection string updated"

      # ── Systemd service files (idempotent) ───────────────────────────────────
      - name: Write backend service file
        run: |
          DOTNET=$(which dotnet)
          sudo tee /etc/systemd/system/maba-backend.service > /dev/null << EOF
          [Unit]
          Description=MABA Backend API
          After=network.target

          [Service]
          Type=simple
          User=abd
          Group=abd
          WorkingDirectory=${{ env.DEPLOY_ROOT }}/publish
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment=ASPNETCORE_URLS=http://0.0.0.0:9090
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false
          ExecStart=${DOTNET} ${{ env.DEPLOY_ROOT }}/publish/Maba.Api.dll
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Write frontend service file
        run: |
          SERVE=$(which serve || echo /usr/local/bin/serve)
          # Install serve if missing
          command -v serve || sudo npm install -g serve
          sudo tee /etc/systemd/system/maba-frontend.service > /dev/null << EOF
          [Unit]
          Description=MABA Frontend
          After=network.target

          [Service]
          Type=simple
          User=abd
          WorkingDirectory=${{ env.DEPLOY_ROOT }}/maba-ng/browser
          Environment=NODE_ENV=production
          ExecStart=${SERVE} -s . -l tcp://0.0.0.0:9087 --single
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Reload & restart services
        run: |
          sudo systemctl daemon-reload
          sudo systemctl enable maba-backend.service maba-frontend.service
          sudo systemctl restart maba-backend.service
          sudo systemctl restart maba-frontend.service

      # ── Health check ─────────────────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting 15s for services to initialise..."
          sleep 15

          sudo systemctl is-active --quiet maba-backend.service  && echo "✅ Backend service active"  || echo "❌ Backend service NOT active"
          sudo systemctl is-active --quiet maba-frontend.service && echo "✅ Frontend service active" || echo "❌ Frontend service NOT active"

          curl -sf http://localhost:9090/api/health > /dev/null \
            && echo "✅ Backend HTTP OK" \
            || echo "⚠️  Backend HTTP not responding on :9090 (may still be migrating)"

          curl -sf http://localhost:9087 > /dev/null \
            && echo "✅ Frontend HTTP OK" \
            || echo "⚠️  Frontend HTTP not responding on :9087"

          echo "─────────────────────────────"
          echo "Deployment complete: $(date)"
