    <circle cx="520" cy="280" r="75"/><circle cx="520" cy="280" r="55"/><circle cx="520" cy="280" r="22"/>
    <line x1="520" y1="205" x2="520" y2="178"/><line x1="520" y1="355" x2="520" y2="382"/><line x1="445" y1="280" x2="418" y2="280"/><line x1="595" y1="280" x2="622" y2="280"/>
    <line x1="498" y1="258" x2="478" y2="238"/><line x1="542" y1="302" x2="562" y2="322"/><line x1="498" y1="302" x2="478" y2="322"/><line x1="542" y1="258" x2="562" y2="238"/>
    <!-- Wireframe cube -->
    <path d="M 120 580 L 260 520 L 260 640 L 120 700 L -20 640 L -20 520 Z"/>
    <path d="M 120 580 L 120 700 M 260 520 L 260 640 M -20 520 L -20 640"/>
    <path d="M 120 580 L -20 520 M 260 520 L 120 580 M 260 640 L 120 700 M -20 640 L 120 700"/>
