    <!-- Dimension block -->
    <line x1="50" y1="720" x2="350" y2="720"/><path d="M50 720 v10 M350 720 v10" stroke-linecap="round"/>
    <circle cx="50" cy="730" r="5" fill="none"/><circle cx="350" cy="730" r="5" fill="none"/>
