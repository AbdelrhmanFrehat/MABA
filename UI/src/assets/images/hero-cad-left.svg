    <line x1="218" y1="302" x2="188" y2="272"/><line x1="342" y1="458" x2="372" y2="488"/><line x1="218" y1="458" x2="188" y2="488"/><line x1="342" y1="302" x2="372" y2="272"/>
    <line x1="253" y1="253" x2="230" y2="230"/><line x1="307" y1="507" x2="330" y2="530"/><line x1="253" y1="507" x2="230" y2="530"/><line x1="307" y1="253" x2="330" y2="230"/>
    <!-- Dimension lines - gear -->
    <line x1="280" y1="200" x2="280" y2="560"/><path d="M280 200 v-18 M280 560 v18" stroke-linecap="round"/>
    <line x1="100" y1="380" x2="460" y2="380"/><path d="M100 380 h-18 M460 380 h18" stroke-linecap="round"/>
    <circle cx="280" cy="182" r="6" fill="none"/><circle cx="280" cy="578" r="6" fill="none"/><circle cx="82" cy="380" r="6" fill="none"/><circle cx="478" cy="380" r="6" fill="none"/>
